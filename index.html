<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Circuitos Electorales</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    
    <style>
        /* Ajustes de tamaño para que el mapa ocupe toda la pantalla */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: Arial, sans-serif;
        }
        #map {
            height: 100%;
            width: 100%;
        }
        .info-title {
            position: absolute;
            top: 10px;
            left: 50px;
            z-index: 1000;
            background: white;
            padding: 10px;
            border-radius: 5px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="info-title">
        <h3>Circuitos Electorales</h3>
        <p>Pasa el cursor o haz clic sobre un circuito para ver su etiqueta.</p>
    </div>

    <div id="map"></div>

    <script href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <script>
        // 1. Inicializar el mapa centrado en una posición inicial (Buenos Aires/Mar del Plata aprox)
        // El zoom inicial es 8, pero se autoajustará luego a los circuitos
        var map = L.map('map').setView([-37.5, -58.5], 8);

        // 2. Añadir un mapa base gratuito (OpenStreetMap)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 3. Función para interactuar con cada circuito (Feature)
        function labelCircuitos(feature, layer) {
            // Validamos si la propiedad existe (ajusta 'circuito' si en tu JSON se llama diferente, ej: 'CIRCUITO')
            if (feature.properties && feature.properties.circuito) {
                
                // Opción A: Crear una etiqueta emergente clásica al hacer CLIC (Popup)
                layer.bindPopup("<strong>Circuito Electoral:</strong> " + feature.properties.circuito);
                
                // Opción B: Crear una etiqueta permanente o tooltip al pasar el MOUSE
                layer.bindTooltip("Circuito: " + feature.properties.circuito, {
                    sticky: true // Sigue al cursor
                });
            }

            // Cambiar estilos visuales al pasar el mouse por encima (opcional pero interactivo)
            layer.on({
                mouseover: function (e) {
                    var layer = e.target;
                    layer.setStyle({
                        weight: 3,
                        color: '#3388ff',
                        fillOpacity: 0.7
                    });
                },
                mouseout: function (e) {
                    geojsonLayer.resetStyle(e.target);
                }
            });
        }

        // Estilo visual por defecto de los circuitos poligonales
        var estiloCircuitos = {
            "color": "#ff7800",
            "weight": 1.5,
            "opacity": 0.65,
            "fillColor": "#ff7800",
            "fillOpacity": 0.2
        };

        // 4. Cargar el archivo GeoJSON dinámicamente
        // Nota: Asegúrate de renombrar tu archivo a "circuitos.json" y guardarlo en la misma carpeta que este HTML
        var geojsonLayer;
        
        fetch('circuitos-electorales-pba (1).json')
            .then(response => response.json())
            .then(data => {
                geojsonLayer = L.geoJSON(data, {
                    style: estiloCircuitos,
                    onEachFeature: labelCircuitos
                }).addTo(map);

                // Autoajustar el zoom de la pantalla para que encuadre perfectamente todos tus circuitos cargados
                map.fitBounds(geojsonLayer.getBounds());
            })
            .catch(error => console.error('Error cargando el archivo GeoJSON:', error));

    </script>
</body>
</html>
